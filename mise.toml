[tools]
go = "1.26.3"
golangci-lint = "2"
svu = "3"

[tasks.build]
description = "Build the binary"
run = """
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
go build -ldflags "-X main.version=$VERSION" -o skillyard ./cmd/skillyard
"""

[tasks.install]
description = "Build and install to ~/bin"
run = """
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
mkdir -p "$HOME/bin"
go build -ldflags "-X main.version=$VERSION" -o "$HOME/bin/skillyard" ./cmd/skillyard
"""

[tasks.test]
description = "Run tests"
run = "go test -v ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.clean]
description = "Clean build artifacts"
run = """
rm -f skillyard
rm -rf dist/
"""

[tasks.check]
description = "Run all checks (build, test, lint)"
depends = ["build", "test", "lint"]

[tasks.release]
description = "Tag the next version and push to trigger a release"
depends = ["check"]
run = """
NEXT=$(svu next)
CURRENT=$(svu current)
if [ "$NEXT" = "$CURRENT" ]; then
  echo "No version bump detected (current: $CURRENT). Use conventional commits (feat:, fix:, etc.)."
  exit 1
fi
echo "Releasing $CURRENT -> $NEXT"
git tag "$NEXT"
git push origin "$NEXT"
echo "Tagged and pushed $NEXT; release workflow will run on GitHub."
"""
